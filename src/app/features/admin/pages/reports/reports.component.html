<div class="admin-page">

  <div class="block-head">
    <div>
      <h2 class="block-head__title">Reportes</h2>
      <p class="block-head__sub mono">Exporta tus datos a CSV con filtros de fecha</p>
    </div>
  </div>

  <div class="rp-dates">
    <div class="form-field">
      <label class="form-label" for="rp-from">Desde</label>
      <input id="rp-from" class="form-control" type="date" [(ngModel)]="from" />
    </div>
    <div class="form-field">
      <label class="form-label" for="rp-to">Hasta</label>
      <input id="rp-to" class="form-control" type="date" [(ngModel)]="to" />
    </div>
    @if (from || to) {
      <button class="btn btn--ghost btn--sm" type="button" (click)="clearDates()">Limpiar fechas</button>
    }
    <p class="rp-dates__hint">Si no eliges fechas, se exporta todo el historial.</p>
  </div>

  @if (error()) {
    <p class="rp-alert" role="alert">{{ error() }}</p>
  }

  <div class="grid-3">
    @for (r of reports; track r.type) {
      <article class="panel panel--pad rp-card">
        <div class="rp-card__head">
          <span class="rp-card__icon"><app-icon [name]="$any(r.icon)" [size]="24" /></span>
          <h3 class="rp-card__title">{{ r.title }}</h3>
        </div>
        <p class="rp-card__desc">{{ r.description }}</p>

        @if (r.statuses.length > 0) {
          <select class="form-control rp-card__sel" [(ngModel)]="statusByType[r.type]">
            @for (st of r.statuses; track st.value) {
              <option [value]="st.value">{{ st.label }}</option>
            }
          </select>
        }

        <button
          class="btn btn--primary btn--sm btn--block"
          type="button"
          [disabled]="downloading() === r.type"
          (click)="download(r.type)"
        >
          @if (downloading() === r.type) {
            Generando…
          } @else {
            <app-icon name="download" [size]="16" /> Descargar CSV
          }
        </button>
      </article>
    }
  </div>

</div>
