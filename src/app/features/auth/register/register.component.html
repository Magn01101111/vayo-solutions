<div class="auth-page">
  <div class="auth-card">

    <!-- Brand -->
    <div class="auth-card__brand">
      <span class="auth-card__logo">VAYO</span>
      <p class="auth-card__tagline">Crea tu cuenta gratuita</p>
    </div>

    <!-- Form -->
    <form class="auth-form" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label class="form-label" for="name">
          Nombre completo <span class="required">*</span>
        </label>
        <input
          id="name"
          class="input"
          type="text"
          [(ngModel)]="name"
          name="name"
          placeholder="Juan Pérez"
          autocomplete="name"
          [disabled]="loading"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="rut">
          RUT <span class="required">*</span>
        </label>
        <input
          id="rut"
          class="input"
          type="text"
          [ngModel]="rut"
          (ngModelChange)="onRutInput($event)"
          name="rut"
          placeholder="12.345.678-9"
          autocomplete="off"
          inputmode="text"
          maxlength="12"
          [disabled]="loading"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">
          Correo electrónico <span class="required">*</span>
        </label>
        <input
          id="email"
          class="input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="juan@empresa.cl"
          autocomplete="email"
          [disabled]="loading"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="phone">
          Teléfono móvil <span class="required">*</span>
        </label>
        <div class="phone-input">
          <span class="phone-input__prefix">+56&nbsp;9</span>
          <input
            id="phone"
            class="input phone-input__field"
            type="tel"
            [ngModel]="phoneDigits"
            (ngModelChange)="onPhoneInput($event)"
            name="phone"
            placeholder="12345678"
            autocomplete="tel-national"
            inputmode="numeric"
            maxlength="8"
            [disabled]="loading"
            required
          />
        </div>
        <p class="form-hint">Solo los 8 dígitos del número, sin espacios.</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          Contraseña <span class="required">*</span>
        </label>
        <div class="auth-form__pass-wrap">
          <input
            id="password"
            class="input"
            [type]="showPass ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
            [disabled]="loading"
            required
          />
          <button
            type="button"
            class="auth-form__pass-toggle"
            (click)="togglePassword()"
            [attr.aria-label]="showPass ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <app-icon [name]="showPass ? 'eye-off' : 'eye'" [size]="18" />
          </button>
        </div>
      </div>

      <!-- Error message -->
      @if (error) {
        <div class="auth-alert" role="alert">{{ error }}</div>
      }

      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="loading"
      >
        @if (loading) {
          <span class="auth-form__spinner"></span>
          Creando cuenta…
        } @else {
          Crear cuenta
        }
      </button>

    </form>

    <!-- Footer links -->
    <p class="auth-card__footer">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="auth-link">Inicia sesión</a>
    </p>

  </div>
</div>
