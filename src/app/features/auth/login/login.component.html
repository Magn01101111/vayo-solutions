<div class="login-page">
  <div class="login-card">

    <!-- Brand -->
    <div class="login-card__brand">
      <span class="login-card__logo">VAYO</span>
      <p class="login-card__tagline">Panel de gestión interno</p>
    </div>

    <!-- Form -->
    <form class="login-form" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input
          id="email"
          class="input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@vayo.cl"
          autocomplete="username"
          [disabled]="loading"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="login-form__pass-wrap">
          <input
            id="password"
            class="input"
            [type]="showPass ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            [disabled]="loading"
            required
          />
          <button
            type="button"
            class="login-form__pass-toggle"
            (click)="togglePassword()"
            [attr.aria-label]="showPass ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            {{ showPass ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <!-- Error message -->
      @if (error) {
        <div class="login-alert" role="alert">{{ error }}</div>
      }

      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="loading"
      >
        @if (loading) {
          <span class="login-form__spinner"></span>
          Ingresando…
        } @else {
          Iniciar sesión
        }
      </button>

    </form>

  </div>
</div>
