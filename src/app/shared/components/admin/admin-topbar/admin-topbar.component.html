<header class="topbar" role="banner">
  <div class="topbar__left">
    <h1 class="topbar__title">Panel de administración</h1>
    <p class="topbar__sub">Gestión interna VAYO Solutions</p>
  </div>

  @if (user) {
    <div class="topbar__user">
      <app-notification-bell />
      <div class="topbar__info" aria-label="Usuario actual">
        <span class="topbar__name">{{ user.name }}</span>
        <span class="topbar__role">{{ roleLabel }}</span>
      </div>
      <div class="topbar__avatar" aria-hidden="true">
        {{ user.name.charAt(0).toUpperCase() }}
      </div>
      <button
        type="button"
        class="btn btn--ghost btn--sm"
        (click)="logout()"
        aria-label="Cerrar sesión"
      >
        Salir
      </button>
    </div>
  }
</header>
