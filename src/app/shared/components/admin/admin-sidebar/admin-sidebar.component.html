<aside class="admin-sidebar">
  <div class="admin-sidebar__brand">
    <img src="assets/adminLogo.ico" alt="VAYO Admin" class="admin-sidebar__brand-icon" />
  </div>

  <nav class="admin-sidebar__nav">
    <a routerLink="/admin" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="active">
      Dashboard
    </a>
    <a routerLink="/admin/productos" routerLinkActive="active">Productos</a>
    <a routerLink="/admin/categorias" routerLinkActive="active">Categorías</a>
    <a routerLink="/admin/cotizaciones" routerLinkActive="active">Cotizaciones</a>
    <a routerLink="/admin/clientes" routerLinkActive="active">Clientes</a>
    @if (isAdmin) {
      <a routerLink="/admin/usuarios" routerLinkActive="active">Usuarios</a>
    }
    <a routerLink="/admin/ventas" routerLinkActive="active">Ventas</a>
    <a routerLink="/admin/reportes" routerLinkActive="active">Reportes</a>
    @if (isAdmin) {
      <a routerLink="/admin/proveedores" routerLinkActive="active">Proveedores</a>
      <a routerLink="/admin/resenas" routerLinkActive="active">Reseñas</a>
      <a routerLink="/admin/configuracion" routerLinkActive="active">Configuración</a>
    }
  </nav>
</aside>
